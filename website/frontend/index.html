<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Genuineness Verifier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-5">
        <!-- Header Card -->
        <div class="card">
            <div class="card-header text-center">
                <h1>🔒 Website Genuineness Verification</h1>
                <p class="lead">Enter a URL to check its authenticity and safety</p>
            </div>
            <div class="card-body">
                <form id="verify-form">
                    <div class="input-group mb-3">
                        <input type="text" id="url-input" class="form-control form-control-lg" 
                               placeholder="https://example.com" required>
                        <button class="btn btn-primary btn-lg" type="submit" id="verify-button">Verify</button>
                    </div>
                    <small class="form-text text-muted">Example: https://www.google.com or amazon.com</small>
                </form>
            </div>
        </div>

        <!-- Results Container -->
        <div id="result-container" class="mt-4" style="display: none;">
            <div class="card">
                <div class="card-header bg-dark text-white">
                    <h3>📋 Verification Report</h3>
                </div>
                <div class="card-body">
                    <!-- URL Display -->
                    <div class="row mb-4">
                        <div class="col-md-8">
                            <h5>URL Checked:</h5>
                            <p class="text-break" id="report-url"></p>
                        </div>
                        <div class="col-md-4">
                            <h5>Timestamp:</h5>
                            <p id="report-timestamp"></p>
                        </div>
                    </div>

                    <hr>

                    <!-- Trust Score and Verdict -->
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <h5>Verdict:</h5>
                            <p>
                                <span id="report-verdict" class="badge fs-5"></span>
                            </p>
                        </div>
                        <div class="col-md-6">
                            <h5>Trust Score:</h5>
                            <div class="progress" style="height: 30px;">
                                <div id="report-score-bar" class="progress-bar" role="progressbar" 
                                     style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                                    <span id="report-score"></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <hr>

                    <!-- Component Details -->
                    <h5>Analysis Details:</h5>
                    <div class="row">
                        <div class="col-md-6">
                            <h6 class="text-primary">Security Checks:</h6>
                            <ul id="report-details" class="list-group">
                            </ul>
                        </div>
                        <div class="col-md-6">
                            <h6 class="text-primary">Component Scores:</h6>
                            <ul id="report-component-scores" class="list-group">
                            </ul>
                        </div>
                    </div>

                    <hr>

                    <!-- Warnings/Alerts -->
                    <div id="warnings-container" style="display: none;">
                        <h5 class="text-warning">⚠️ Warnings:</h5>
                        <ul id="warnings-list" class="list-group list-group-flush">
                        </ul>
                        <hr>
                    </div>

                    <!-- Action Buttons -->
                    <div class="mt-4">
                        <button class="btn btn-secondary" onclick="location.reload()">Run Another Check</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Error Container -->
        <div id="error-container" class="mt-4" style="display: none;">
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                <h4 class="alert-heading">Error!</h4>
                <p id="error-message"></p>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loading-spinner" class="spinner-border d-none" role="status" 
         style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999;">
        <span class="visually-hidden">Verifying...</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
